analysis:
  lookback: 24h
  trend_window: 168h  # 7 days

detection:
  false_positive:
    min_sample_size: 20
    deviation_threshold: 2.0
    absolute_rate_threshold: 0.3
  bypass:
    window: 5m
    min_retries: 2
  anomaly:
    volume_spike_threshold: 3.0

scoring:
  weights:
    signal_strength: 0.35
    impact: 0.25
    actionability: 0.25
    novelty: 0.15

routing:
  high_confidence: 0.8
  medium_confidence: 0.5
  dedup_similarity: 0.85
  dedup_lookback: 168h  # 7 days

interpreter:
  model: claude-sonnet-4-6
  max_findings_per_batch: 20

digest:
  slack_enabled: false

github:
  repo: chitinhq/chitin
  labels:
    - sentinel
    - "stage:architect"

ingestion:
  enabled: true
  github_actions:
    repos:
      - chitinhq/chitin
      - chitinhq/octi
      - chitinhq/sentinel
      - chitinhq/shellforge
    since: 168h
    poll_interval: 1h
    actor_patterns:
      - pattern: "github-actions\\[bot\\]"
        agent_id: "github-actions"
      - pattern: "copilot"
        agent_id: "copilot"
      - pattern: "octi-pulpo"
        agent_id: "octi-pulpo"
  chitin_governance:
    # Configure workspace paths where chitin-governed repos are checked out.
    # Use absolute paths or set WORKSPACE env var (e.g. ${WORKSPACE}/chitin).
    workspaces:
      - ${WORKSPACE}
      - ${WORKSPACE}/chitin
      - ${WORKSPACE}/octi
      - ${WORKSPACE}/sentinel
      - ${WORKSPACE}/shellforge
      - ${WORKSPACE}/clawta
      - ${WORKSPACE}/atlas
      - ${WORKSPACE}/llmint
  chitin_runtime:
    # Chitin's runtime layer (session/gate/soul events). Distinct
    # from chitin_governance: this is per-user state, not per-repo.
    # Empty state_dir disables the adapter.
    state_dir: ${HOME}/.local/state/chitin
    share_dir: ${HOME}/.local/share/chitin
  # swarm_dispatch adapter RETIRED 2026-04-15: dispatches now flow through
  # chitin_governance (governance_events table, 116+ flow.swarm.dispatch rows/4h)
  # not the legacy jsonl file. The adapter reads a file that has been stale since
  # 2026-04-12 (9 total events). Leaving commented in case we revive.
  #   swarm_dispatch:
  #     # Path to Octi swarm telemetry events file.
  #     telemetry_path: ${HOME}/.local/share/octi/telemetry/swarm-events.jsonl

  brain_state:
    enabled: true
    interval: 5m

insights:
  enabled: true
  max_frequency_minutes: 60
  volume_spike_threshold: 3.0
  score_delta_threshold: 5

health:
  window_hours: 24
  weights:
    success_rate: 0.30
    governance_compliance: 0.25
    latency: 0.15
    budget_health: 0.15
    stability: 0.15
  brain_health_threshold_skip: 30
  brain_health_threshold_limit: 60

# Tenant scope for governance_events. tenant_id is required by the FK;
# override with CHITIN_TENANT_ID env var if running against a non-default
# Neon tenant. Default below is the seeded "chitin" tenant.
tenant:
  id: "00000000-0000-0000-0000-000000000001"

# Four-signal swarm circuit breaker. Orthogonal patrol — NOT an inline
# pipeline gate. When any signal trips, emits flow_failed circuit.<signal>
# so Octi's dispatcher can pause dispatching until `chitin circuit reset`
# (or MCP mcp__octi__circuit_reset) closes it again.
#
# Thresholds below are the starting values curie mined from the
# 2026-04-16-0030 quorum window (12,026 events, 3,546 sessions). Per-repo
# health matters because fleet=0.23% but clawta alone is 17% — a
# fleet-averaged bar would never catch the one repo actually bleeding.
circuit:
  enabled: true
  max_retries_per_task: 3
  retry_window: 1h
  max_active_agents: 8
  max_session_duration: 2h
  max_token_burn_rate: 100000  # tokens/minute
  max_open_prs_per_repo: 15
  max_ci_failure_rate: 0.15
  ci_window: 1h
  min_required_field_coverage: 0.95
  telemetry_window: 15m

execution_passes:
  command_failure:
    min_occurrences: 10
    failure_rate_threshold: 0.5
  sequence_detection:
    ngram_range: [2, 5]
    min_frequency: 3
    failure_rate_threshold: 0.6
