# Hourly cron that wakes sentinel to generate LLM-summarized insights from
# execution_events / governance_events already in Neon. Uses the
# `analyze --insights-only` path so it skips ingest + detection + mining.
#
# Cost posture: slice 2 redirected the insight LLM call from pay-per-token
# Anthropic to the flat-rate Ollama Cloud Pro subscription
# (OpenAI-compatible /v1/chat/completions). When OLLAMA_CLOUD_API_KEY is
# absent the job logs + exits 0 so the cron stays green either way.
name: Sentinel Insights (hourly)

on:
  schedule:
    # Runs at :05 past every hour to avoid top-of-hour contention with
    # other fleet crons.
    - cron: "5 * * * *"
  workflow_dispatch: {}

# Prevent two crons (e.g. a long-running one + a manual dispatch) from
# racing against the insights table / Redis rate-limit keys.
concurrency:
  group: sentinel-insights
  cancel-in-progress: false

jobs:
  insights:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build sentinel
        run: go build -o bin/sentinel ./cmd/sentinel

      - name: Run insights generation
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          # Ollama Cloud Pro API key. Insights generator routes through
          # https://ollama.com/v1/chat/completions when this is present.
          # Absence -> runInsightsOnly logs + exits 0 (see cmd/sentinel/main.go).
          OLLAMA_CLOUD_API_KEY: ${{ secrets.OLLAMA_CLOUD_API_KEY }}
          # Force the HTTP API transport (vs. the octi CLI dispatch path,
          # which isn't available inside the GH Actions runner).
          SENTINEL_INSIGHTS_USE_API: "true"
          # Optional. Used for insight rate-limit state; generator tolerates
          # absence and just won't rate-limit across runs.
          SENTINEL_REDIS_URL: ${{ secrets.REDIS_URL }}
          NTFY_TOPIC: chitin
        run: ./bin/sentinel analyze --insights-only
