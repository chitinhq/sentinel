analysis:
  lookback: 24h
  trend_window: 168h  # 7 days

detection:
  false_positive:
    min_sample_size: 20
    deviation_threshold: 2.0
    absolute_rate_threshold: 0.3
  bypass:
    window: 5m
    min_retries: 2
  anomaly:
    volume_spike_threshold: 3.0

scoring:
  weights:
    signal_strength: 0.35
    impact: 0.25
    actionability: 0.25
    novelty: 0.15

routing:
  high_confidence: 0.8
  medium_confidence: 0.5
  dedup_similarity: 0.85
  dedup_lookback: 168h  # 7 days

interpreter:
  model: claude-sonnet-4-6
  max_findings_per_batch: 20

digest:
  slack_enabled: false

github:
  repo: chitinhq/chitin
  labels:
    - sentinel
    - "stage:architect"

ingestion:
  enabled: true
  github_actions:
    repos:
      - chitinhq/chitin
      - chitinhq/octi
      - chitinhq/sentinel
      - chitinhq/clawta
      - chitinhq/shellforge
    since: 168h
    poll_interval: 1h
    actor_patterns:
      - pattern: "github-actions\\[bot\\]"
        agent_id: "github-actions"
      - pattern: "copilot"
        agent_id: "copilot"
      - pattern: "octi-pulpo"
        agent_id: "octi-pulpo"
  chitin_governance:
    workspaces:
      - /home/jared/workspace/chitin
      - /home/jared/workspace/octi
      - /home/jared/workspace/sentinel
      - /home/jared/workspace/clawta
      - /home/jared/workspace/shellforge
  swarm_dispatch:
    telemetry_path: /home/jared/.local/share/octi/telemetry/swarm-events.jsonl
  brain_state:
    enabled: true
    interval: 5m

insights:
  enabled: true
  max_frequency_minutes: 60
  volume_spike_threshold: 3.0
  score_delta_threshold: 5

health:
  window_hours: 24
  weights:
    success_rate: 0.30
    governance_compliance: 0.25
    latency: 0.15
    budget_health: 0.15
    stability: 0.15
  brain_health_threshold_skip: 30
  brain_health_threshold_limit: 60

execution_passes:
  command_failure:
    min_occurrences: 10
    failure_rate_threshold: 0.5
  sequence_detection:
    ngram_range: [2, 5]
    min_frequency: 3
    failure_rate_threshold: 0.6
